<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Study Timer</title>

    <link rel="stylesheet"
          href="css/style.css">
</head>
<body>

<h1>Study Timer</h1>

<div class="timer-box">

    <h2 id="timer">
        00:00:00
    </h2>

    <button onclick="startTimer()">
        Start
    </button>

    <button onclick="stopTimer()">
        Stop
    </button>

    <button onclick="resetTimer()">
        Reset
    </button>

</div>

<script src="js/timer.js"></script>

</body>
</html>
